[www]
user = www-data
group = www-data

; listen on all interfaces on port 9000
; so NGINX can reach us over the Docker network
listen = 0.0.0.0:9000

; process manager settings
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; pass environment variables through to PHP
clear_env = no
